name: OpenFOAM.org v12 compile

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenFOAM.org v12
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common wget gnupg
          wget -qO - https://dl.openfoam.org/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/openfoam.gpg
          echo "deb [signed-by=/usr/share/keyrings/openfoam.gpg] http://dl.openfoam.org/ubuntu $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/openfoam.list
          sudo apt-get update
          sudo apt-get install -y openfoam12

      - name: Compile with wmake
        working-directory: ${{ github.workspace }}
        run: bash -c "source /opt/openfoam12/etc/bashrc && wmake"
