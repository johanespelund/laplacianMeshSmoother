name: OpenFOAM.org v12 compile

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: microfluidica/openfoam:12

    defaults:
      run:
        shell: bash

    steps:
     - name: Compile with wmake
       working-directory: ${{ github.workspace }}
       run: |
          bash -lc '
            set -eo pipefail
      
            if [ -f /opt/openfoam12/etc/bashrc ]; then
              source /opt/openfoam12/etc/bashrc
            elif [ -f /usr/lib/openfoam/openfoam12/etc/bashrc ]; then
              source /usr/lib/openfoam/openfoam12/etc/bashrc
            else
              echo "OpenFOAM v12 environment script not found in container"
              exit 1
            fi
      
            echo "Detected OpenFOAM version: ${WM_PROJECT_VERSION}"
            test "${WM_PROJECT_VERSION}" = "12"
      
            foamVersion
      
            wmake
