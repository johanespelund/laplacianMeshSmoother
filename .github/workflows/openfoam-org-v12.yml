name: OpenFOAM.org v12 compile

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenFOAM.org v12
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common wget gnupg
          wget -qO - https://dl.openfoam.org/gpg.key | sudo apt-key add -
          sudo add-apt-repository -y http://dl.openfoam.org/ubuntu
          sudo apt-get update
          sudo apt-get install -y openfoam12

      - name: Compile with wmake
        shell: bash
        run: |
          source /opt/openfoam12/etc/bashrc
          wmake
